<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Movies</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/images/iconFilm.png">
</head>
<body>
<div class="progress-bar">
    <div class="progress-fill"></div>
</div>
    <div class="container">
        <section class="search">
            <h1>Search Movies</h1>
            <p>Discover your next favorite movie from thousands of titles</p>
<!-- form input -->
            <form class="wrapper" id="wrapper">
                <input type="text" id="movie-name" placeholder="Search your Movies..." autocomplete="off">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 iconFilter">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 0 1-.659 1.591l-5.432 5.432a2.25 2.25 0 0 0-.659 1.591v2.927a2.25 2.25 0 0 1-1.244 2.013L9.75 21v-6.568a2.25 2.25 0 0 0-.659-1.591L3.659 7.409A2.25 2.25 0 0 1 3 5.818V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0 1 12 3Z" />
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 iconClose hidden">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </form>
<!-- modal filter -->
            <section class="modal-filter hidden">
                <h4>Filter by Genre</h4>
                <span class="active">All</span>
                <span>Action</span>
                <span>Adventure</span>
                <span>Sci-Fi</span>
                <span>Drama</span>
                <span>Thriller</span>
                <span>Crime</span>
                <span>Biography</span>
                <span>History</span>
                <span>Animation</span>
                <span>Romance</span>
            </section>
        </section>
        <section class="empty-status">
            <i class="fa-solid fa-magnifying-glass iconSearch-footer"></i>
            <p>Start Searching</p>
            <p>Enter movie title to discoer amazing films</p>
        </section>
        <div class="counter">
            <p class="movies-counter hidden">Found <span class="movies-count">0</span> movies</p>
        </div>
<!-- card list -->
        <section class="movies-grid"></section>
    </div>

<script src="assets/js/index.js"></script>
<script src="assets/js/all.min.js"></script>
<script src="config.js"></script>
</body>
</html>
